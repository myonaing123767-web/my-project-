<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }
        }

        .summary-card {
            padding: 20px;
            text-align: center;
        }

        .summary-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .value-income { color: var(--success); }
        .value-expense { color: var(--danger); }
        .value-balance { color: var(--primary); }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        .transaction-list {
            margin-top: 20px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info h4 {
            font-size: 1rem;
            font-weight: 600;
        }

        .transaction-info p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .transaction-amount {
            font-weight: 700;
        }

        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding-top: 20px;
        }

        .chart-bar {
            flex: 1;
            background-color: var(--primary);
            border-radius: 4px 4px 0 0;
            position: relative;
            min-height: 5px;
        }

        .chart-bar:hover::after {
            content: attr(data-value);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
        }

        .delete-btn {
            background: none;
            color: var(--danger);
            border: none;
            width: auto;
            padding: 4px 8px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background: #fee2e2;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            background: var(--border);
            color: var(--text-muted);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FinanceFlow</h1>
            <div id="current-date"></div>
        </header>

        <div class="summary-cards">
            <div class="card summary-card">
                <div class="summary-label">Total Balance</div>
                <div id="total-balance" class="summary-value value-balance">$0.00</div>
            </div>
            <div class="card summary-card">
                <div class="summary-label">Income</div>
                <div id="total-income" class="summary-value value-income">$0.00</div>
            </div>
            <div class="card summary-card">
                <div class="summary-label">Expenses</div>
                <div id="total-expenses" class="summary-value value-expense">$0.00</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3 style="margin-bottom: 20px;">Add Transaction</h3>
                <form id="transaction-form">
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="desc" placeholder="e.g. Salary, Groceries" required>
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="type">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="General">General</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Housing">Housing</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                        </select>
                    </div>
                    <button type="submit">Add Transaction</button>
                </form>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Spending Analysis</h3>
                </div>
                <div id="chart" class="chart-container">
                    <!-- Bars will be generated by JS -->
                </div>
                <div id="chart-labels" style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 10px; color: var(--text-muted);">
                    <!-- Labels will be generated by JS -->
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Recent Transactions</h3>
                <div class="tabs">
                    <div class="tab active" onclick="filterTransactions('all')">All</div>
                    <div class="tab" onclick="filterTransactions('income')">Income</div>
                    <div class="tab" onclick="filterTransactions('expense')">Expense</div>
                </div>
            </div>
            <div id="transaction-list" class="transaction-list">
                <!-- Transactions will be added here -->
                <div class="empty-state">No transactions yet. Add one to get started!</div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let currentFilter = 'all';

        // Elements
        const transactionForm = document.getElementById('transaction-form');
        const transactionList = document.getElementById('transaction-list');
        const totalBalance = document.getElementById('total-balance');
        const totalIncome = document.getElementById('total-income');
        const totalExpenses = document.getElementById('total-expenses');
        const chartContainer = document.getElementById('chart');
        const chartLabels = document.getElementById('chart-labels');
        const currentDateEl = document.getElementById('current-date');

        // Initialize
        function init() {
            updateUI();
            const now = new Date();
            currentDateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        // Add transaction
        transactionForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;

            const transaction = {
                id: Date.now(),
                description: desc,
                amount: amount,
                type: type,
                category: category,
                date: new Date().toISOString()
            };

            transactions.push(transaction);
            saveTransactions();
            updateUI();
            transactionForm.reset();
        });

        // Delete transaction
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveTransactions();
            updateUI();
        }

        // Save to localStorage
        function saveTransactions() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Filter transactions
        function filterTransactions(filter) {
            currentFilter = filter;
            
            // Update tabs UI
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.toLowerCase() === filter) {
                    tab.classList.add('active');
                }
            });
            
            updateUI();
        }

        // Update UI components
        function updateUI() {
            renderTransactions();
            updateSummary();
            renderChart();
        }

        function renderTransactions() {
            transactionList.innerHTML = '';
            
            const filtered = transactions.filter(t => {
                if (currentFilter === 'all') return true;
                return t.type === currentFilter;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                transactionList.innerHTML = '<div class="empty-state">No transactions found.</div>';
                return;
            }

            filtered.forEach(t => {
                const item = document.createElement('div');
                item.className = 'transaction-item';
                
                const sign = t.type === 'income' ? '+' : '-';
                const colorClass = t.type === 'income' ? 'value-income' : 'value-expense';
                
                item.innerHTML = `
                    <div class="transaction-info">
                        <h4>${t.description}</h4>
                        <p>${t.category} • ${new Date(t.date).toLocaleDateString()}</p>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="transaction-amount ${colorClass}">${sign}$${t.amount.toFixed(2)}</span>
                        <button class="delete-btn" onclick="deleteTransaction(${t.id})">Delete</button>
                    </div>
                `;
                transactionList.appendChild(item);
            });
        }

        function updateSummary() {
            const income = transactions
                .filter(t => t.type === 'income')
                .reduce((acc, t) => acc + t.amount, 0);
            
            const expenses = transactions
                .filter(t => t.type === 'expense')
                .reduce((acc, t) => acc + t.amount, 0);
            
            const balance = income - expenses;

            totalIncome.textContent = `$${income.toFixed(2)}`;
            totalExpenses.textContent = `$${expenses.toFixed(2)}`;
            totalBalance.textContent = `$${balance.toFixed(2)}`;
            
            totalBalance.className = `summary-value ${balance >= 0 ? 'value-balance' : 'value-expense'}`;
        }

        function renderChart() {
            chartContainer.innerHTML = '';
            chartLabels.innerHTML = '';
            
            const categories = ['Food', 'Transport', 'Housing', 'Entertainment', 'Shopping', 'Health', 'General'];
            const categoryData = {};
            
            categories.forEach(cat => categoryData[cat] = 0);
            
            transactions
                .filter(t => t.type === 'expense')
                .forEach(t => {
                    if (categoryData[t.category] !== undefined) {
                        categoryData[t.category] += t.amount;
                    }
                });

            const maxExpense = Math.max(...Object.values(categoryData), 100);

            categories.forEach(cat => {
                const amount = categoryData[cat];
                const height = (amount / maxExpense) * 100;
                
                // Bar
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = `${Math.max(height, 2)}%`;
                bar.setAttribute('data-value', `$${amount.toFixed(0)}`);
                chartContainer.appendChild(bar);
                
                // Label
                const label = document.createElement('div');
                label.style.width = `${100 / categories.length}%`;
                label.style.textAlign = 'center';
                label.textContent = cat.substring(0, 3);
                chartLabels.appendChild(label);
            });
        }

        // Start the app
        init();
    </script>
</body>
</html>
